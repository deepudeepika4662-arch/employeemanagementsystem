services:
  - type: web
    name: employee-management
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn employee_management.wsgi:application --log-file -
    envVars:
      - key: DJANGO_SECRET_KEY
        value: "replace-me-with-a-secure-key"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
    autoDeploy: true
