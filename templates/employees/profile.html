{% extends 'employees/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="form-card">
      <h3 class="mb-3">Your Profile</h3>
      <p class="text-muted">Review and update the employee information associated with your account.</p>
      <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">Save changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
