{% extends 'employees/base.html' %}
{% block content %}
<div class="confirm-card mx-auto" style="max-width: 680px;">
  <h3 class="mb-3">Confirm employee deletion</h3>
  <p class="text-muted">This action is permanent. Are you sure you want to remove <strong>{{ employee.full_name }}</strong> from the system?</p>
  <form method="post">{% csrf_token %}
    <div class="d-flex gap-2 flex-wrap mt-3">
      <button class="btn btn-danger" type="submit">Yes, delete</button>
      <a class="btn btn-outline-secondary" href="{% url 'employees:list' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
